<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>حاسبة السكر</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      direction: rtl;
      text-align: right;
      margin: 20px;
      font-size: 24px;
    }

    h1 {
      font-size: 28px;
    }

    label {
      display: block;
      margin-top: 15px;
      margin-bottom: 5px;
    }

    input {
      width: 100%;
      font-size: 24px;
      padding: 10px;
      margin-bottom: 10px;
    }

    button {
      width: 100%;
      font-size: 26px;
      padding: 12px;
      margin-top: 15px;
    }

    #result {
      margin-top: 25px;
      font-size: 26px;
      line-height: 1.8;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <h1>حاسبة السكر</h1>

  <label>قياس السكر الحالي:</label>
  <input id="x" type="number">

  <label>قياس السكر السابق:</label>
  <input id="y" type="number">

  <label>الوقت بين القياسين بالدقائق:</label>
  <input id="t" type="number">

  <button onclick="calc()">احسب</button>

  <div id="result"></div>

  <script>
    function calc() {
      var X = Number(document.getElementById("x").value);
      var Y = Number(document.getElementById("y").value);
      var T = Number(document.getElementById("t").value);
      var result = document.getElementById("result");

      if (!X && X !== 0 || !Y && Y !== 0 || !T && T !== 0) {
        result.innerHTML = "يرجى إدخال جميع القيم.";
        return;
      }

      if (T <= 0) {
        result.innerHTML = "الوقت يجب أن يكون أكبر من 0.";
        return;
      }

      var Z = X + (((X - Y) * 180) / T);
      var text = "القياس المتوقع بعد 3 ساعات: " + Z.toFixed(1) + "<br>";

      if (Z < 70) {
        text += "تحذير: السكر منخفض.";
      } else if (Z < 200) {
        text += "لا يأخذ أي جرعة.";
      } else {
        var d = Math.floor((Z - 70) / 130);
        text += "الجرعة المناسبة هي: " + d;
      }

      result.innerHTML = text;
    }
  </script>

</body>
</html>
